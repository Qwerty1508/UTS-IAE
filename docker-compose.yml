version: '3.8'

services:
  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - laravel-net

  # User Service
  user-service-app:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./UserService:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8000:8080"
    networks:
      - laravel-net
    depends_on:
      - user-service-db

  user-service-db:
    image: mysql:8.0
    container_name: user-service-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: uts_user
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - laravel-net

  # Product Service
  product-service-app:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: product-service-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./ProductService:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8001:8080"
    networks:
      - laravel-net
    depends_on:
      - product-service-db
      - rabbitmq

  product-service-worker:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    container_name: product-service-worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./ProductService:/var/www/html
      - /var/www/html/vendor
    command: php artisan queue:work rabbitmq --queue=product-stock-update
    networks:
      - laravel-net
    depends_on:
      - product-service-db
      - rabbitmq

  product-service-db:
    image: mysql:8.0
    container_name: product-service-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: uts_product
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    networks:
      - laravel-net

  # Order Service
  order-service-app:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    container_name: order-service-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./OrderService:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8002:8080"
    networks:
      - laravel-net
    depends_on:
      - order-service-db
      - rabbitmq

  order-service-worker:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    container_name: order-service-worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./OrderService:/var/www/html
      - /var/www/html/vendor
    command: php artisan queue:work rabbitmq
    networks:
      - laravel-net
    depends_on:
      - order-service-db
      - rabbitmq

  order-service-db:
    image: mysql:8.0
    container_name: order-service-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: uts_order
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    networks:
      - laravel-net

networks:
  laravel-net:
    driver: bridge
